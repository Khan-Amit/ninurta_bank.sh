                <button id="loginBtn" class="primary">🔓 LOGIN WITH THIS DEVICE</button>
                <button id="resetDeviceBtn" class="warning">🔄 RESET DEVICE (Admin)</button>
            </div>
            
            <div id="balanceDisplay" style="display:none;">
                <hr>
                <h4>💰 YOUR BALANCE</h4>
                <div>₿ <span id="btcBalance">0.00000000</span> BTC</div>
                <div>฿ <span id="thbBalance">0.00</span> THB</div>
                <div>📊 Rate: 1 BTC = ฿ <span id="btcRate">1,800,000</span></div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="panel">
            <h3>⚡ ATM FUNCTIONS</h3>
            <div>
                <button id="refreshBtn" class="primary">⟳ REFRESH BALANCE</button>
                <button id="sellBtn">💰 SELL BTC → THB</button>
                <button id="withdrawBtn">🏦 WITHDRAW TO BANK</button>
                <button id="qrBtn">📱 GENERATE QR</button>
                <button id="licenseBtn">📜 LICENSE</button>
            </div>
            <hr style="margin: 1rem 0;">
            <div class="terminal" id="terminal">
                <div class="log-line">> NINURTA BANK ATM v2.0</div>
                <div class="log-line">> IMEI-Locked Vault</div>
                <div class="log-line">> Login with your device</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>MIT License · Device authentication</span>
    </div>
</div>

<script>
    // ============================================================
    // IMEI-BASED AUTHENTICATION (WORKING)
    // ============================================================
    const BTC_ADDR = "bc1qk7ajtrgplvn25600wm7gx9u5c5nk8kz9dfpcqy";
    let unlocked = false;
    let btcBalance = 0;
    let btcRate = 1800000;

    function addLog(msg) {
        let term = document.getElementById('terminal');
        let div = document.createElement('div');
        div.className = 'log-line';
        div.innerText = `> ${new Date().toLocaleTimeString()} · ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
        if(term.children.length > 50) term.removeChild(term.children[0]);
    }

    // Device fingerprint
    async function getDeviceFingerprint() {
        let screen = `${screen.width}x${screen.height}x${screen.colorDepth}`;
        let timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        let lang = navigator.language;
        let platform = navigator.platform;
        let userAgent = navigator.userAgent;
        let fingerprint = `${screen}|${timezone}|${lang}|${platform}|${userAgent}`;
        let hash = 0;
        for (let i = 0; i < fingerprint.length; i++) {
            hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash).toString(16);
    }

    function getStoredDeviceId() {
        return localStorage.getItem('ninurta_device_id');
    }

    function setDeviceId(deviceId) {
        localStorage.setItem('ninurta_device_id', deviceId);
    }

    async function registerAndUnlock() {
        let deviceId = await getDeviceFingerprint();
        setDeviceId(deviceId);
        unlocked = true;
        document.getElementById('imeiStatus').innerHTML = `📱 Device registered: ${deviceId.substring(0,12)}...`;
        document.getElementById('authStatus').innerHTML = '🔓 VAULT UNLOCKED';
        document.getElementById('authStatus').className = 'unlocked';
        document.getElementById('balanceDisplay').style.display = 'block';
        addLog(`🔓 VAULT UNLOCKED — Device registered as master`);
        fetchBalance();
    }

    async function verifyAndUnlock() {
        let storedId = getStoredDeviceId();
        if(!storedId) {
            addLog(`⚡ No device registered. Click LOGIN to register.`);
            return false;
        }
        let currentId = await getDeviceFingerprint();
        document.getElementById('imeiStatus').innerHTML = `📱 Device ID: ${currentId.substring(0,12)}...`;
        if(storedId === currentId) {
            unlocked = true;
            document.getElementById('authStatus').innerHTML = '🔓 VAULT UNLOCKED';
            document.getElementById('authStatus').className = 'unlocked';
            document.getElementById('balanceDisplay').style.display = 'block';
            addLog(`🔓 VAULT UNLOCKED — Device verified`);
            fetchBalance();
            return true;
        } else {
            addLog(`❌ DEVICE MISMATCH — Unauthorized device`);
            return false;
        }
    }

    async function login() {
        let storedId = getStoredDeviceId();
        if(!storedId) {
            await registerAndUnlock();
        } else {
            await verifyAndUnlock();
        }
    }

    function resetDevice() {
        if(confirm("⚠️ WARNING: Reset device lock? You will need to re-register.")) {
            localStorage.removeItem('ninurta_device_id');
            unlocked = false;
            document.getElementById('authStatus').innerHTML = '🔒 VAULT LOCKED';
            document.getElementById('authStatus').className = 'locked';
            document.getElementById('balanceDisplay').style.display = 'none';
            addLog(`🔄 DEVICE RESET — Click Login to register new device`);
        }
    }

    async function fetchBalance() {
        if(!unlocked) { addLog(`⛔ VAULT LOCKED`); return; }
        try {
            let res = await fetch(`https://blockchain.info/q/addressbalance/${BTC_ADDR}`);
            let sat = parseInt(await res.text());
            btcBalance = sat / 100000000;
            document.getElementById('btcBalance').innerText = btcBalance.toFixed(8);
            
            let rateRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=thb');
            let rateData = await rateRes.json();
            btcRate = rateData.bitcoin?.thb || 1800000;
            document.getElementById('btcRate').innerText = btcRate.toLocaleString();
            
            let thb = btcBalance * btcRate;
            document.getElementById('thbBalance').innerText = thb.toFixed(2);
            addLog(`💰 Balance: ${btcBalance.toFixed(8)} BTC (฿${thb.toFixed(2)})`);
        } catch(e) {
            addLog(`⚠️ Failed to fetch balance`);
        }
    }

    function sellBTC() {
        if(!unlocked) { addLog(`⛔ VAULT LOCKED`); return; }
        addLog(`💱 Selling ${btcBalance.toFixed(8)} BTC for ฿${(btcBalance*btcRate).toFixed(2)}`);
        addLog(`📌 Manual: Send BTC to Bitkub → Trade → Withdraw`);
    }

    function withdrawBank() {
        if(!unlocked) { addLog(`⛔ VAULT LOCKED`); return; }
        addLog(`🏦 Withdrawal: Bitkub → Wallet → THB → Withdraw to bank`);
    }

    function generateQR() {
        if(!unlocked) { addLog(`⛔ VAULT LOCKED`); return; }
        let amount = prompt("Enter amount in THB:");
        if(amount && !isNaN(amount)) {
            let phone = prompt("Enter your PromptPay phone number:");
            if(phone) {
                addLog(`📱 QR for ฿${amount}`);
                window.open(`https://quickchart.io/qr?text=https://promptpay.io/${phone}/${amount}&size=200`, '_blank');
            }
        }
    }

    function showLicense() {
        alert("Ninurta Bank ATM\nMIT License\nIMEI-Locked Vault\nNo warranty.");
        addLog(`📜 License viewed`);
    }

    // Event listeners
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('resetDeviceBtn').onclick = resetDevice;
    document.getElementById('refreshBtn').onclick = () => { if(unlocked) fetchBalance(); else addLog(`⛔ VAULT LOCKED`); };
    document.getElementById('sellBtn').onclick = sellBTC;
    document.getElementById('withdrawBtn').onclick = withdrawBank;
    document.getElementById('qrBtn').onclick = generateQR;
    document.getElementById('licenseBtn').onclick = showLicense;

    // Initialize
    (async function init() {
        let storedId = getStoredDeviceId();
        if(storedId) {
            document.getElementById('imeiStatus').innerHTML = `📱 Device registered. Click LOGIN to unlock.`;
            addLog(`🔐 Device registered. Click LOGIN to unlock.`);
        } else {
            document.getElementById('imeiStatus').innerHTML = `📱 No device registered. Click LOGIN to set up.`;
            addLog(`⚡ No device registered. Click LOGIN to set this device as master.`);
        }
    })();
</script>
</body>
</html>
