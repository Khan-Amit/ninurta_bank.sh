<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninurta Bank · Crypto ATM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            font-family: 'Courier New', monospace;
            padding: 1rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: #0f1322;
            padding: 1rem 2rem;
            border-radius: 2rem 2rem 0 0;
            border-bottom: 2px solid #ffcc00;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .title { color: #ffcc00; font-size: 1.5rem; font-weight: bold; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        .panel {
            background: #0f1322;
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid #2a3a60;
        }
        .security-panel {
            background: #0a0e1a;
            border: 2px solid #ff3300;
        }
        .locked { color: #ff6666; }
        .unlocked { color: #88ff88; }
        button {
            background: #1f2c46;
            border: none;
            padding: 10px 20px;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            margin: 0.25rem;
            font-family: monospace;
        }
        button.primary { background: #2a4a7a; }
        button.warning { background: #5a3a2a; }
        .terminal {
            background: #010410;
            border-radius: 1rem;
            padding: 1rem;
            font-size: 0.7rem;
            color: #88ffaa;
            height: 300px;
            overflow-y: auto;
        }
        .log-line {
            border-left: 2px solid #ffcc00;
            padding-left: 8px;
            margin: 4px 0;
        }
        .footer {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            font-size: 0.7rem;
            color: #8da0c0;
        }
        .balance-box {
            margin-top: 15px;
            padding: 10px;
            background: #010410;
            border-radius: 1rem;
            text-align: center;
        }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">🏦 NINURTA BANK ATM</div>
        <div>Crypto to THB Bridge | No Swift</div>
    </div>

    <div class="grid">
        <!-- LEFT PANEL -->
        <div class="panel security-panel">
            <h3>🔐 SECURITY VAULT</h3>
            <div id="authStatus" class="locked">🔒 VAULT LOCKED</div>
            
            <div style="margin: 1rem 0;">
                <button id="loginBtn" class="primary">🔓 UNLOCK VAULT</button>
                <button id="resetBtn" class="warning">🔄 RESET</button>
            </div>
            
            <div id="balanceDisplay" class="balance-box" style="display:none;">
                <strong>💰 YOUR BALANCE</strong><br>
                ₿ <span id="btcBalance">0.00000000</span> BTC<br>
                ฿ <span id="thbBalance">0.00</span> THB<br>
                📊 Rate: 1 BTC = ฿ <span id="btcRate">1,800,000</span>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="panel">
            <h3>⚡ ATM FUNCTIONS</h3>
            <div>
                <button id="refreshBtn" class="primary">⟳ REFRESH BALANCE</button>
                <button id="sellBtn">💰 SELL BTC → THB</button>
                <button id="withdrawBtn">🏦 WITHDRAW TO BANK</button>
                <button id="qrBtn">📱 GENERATE QR</button>
                <button id="licenseBtn">📜 LICENSE</button>
            </div>
            <hr style="margin: 1rem 0;">
            <div class="terminal" id="terminal">
                <div class="log-line">> NINURTA BANK ATM v3.0</div>
                <div class="log-line">> Click UNLOCK VAULT to start</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>MIT License · Simple Vault</span>
    </div>
</div>

<script>
    const BTC_ADDR = "bc1qk7ajtrgplvn25600wm7gx9u5c5nk8kz9dfpcqy";
    let unlocked = false;
    let btcBalance = 0;
    let btcRate = 1800000;

    function addLog(msg) {
        let term = document.getElementById('terminal');
        let div = document.createElement('div');
        div.className = 'log-line';
        div.innerText = `> ${new Date().toLocaleTimeString()} · ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
        if(term.children.length > 50) term.removeChild(term.children[0]);
    }

    // Simple unlock (no IMEI complexity)
    function unlockVault() {
        unlocked = true;
        document.getElementById('authStatus').innerHTML = '🔓 VAULT UNLOCKED';
        document.getElementById('authStatus').className = 'unlocked';
        document.getElementById('balanceDisplay').style.display = 'block';
        addLog(`🔓 VAULT UNLOCKED — Welcome`);
        fetchBalance();
    }

    function resetVault() {
        if(confirm("Reset vault? You will need to unlock again.")) {
            unlocked = false;
            document.getElementById('authStatus').innerHTML = '🔒 VAULT LOCKED';
            document.getElementById('authStatus').className = 'locked';
            document.getElementById('balanceDisplay').style.display = 'none';
            addLog(`🔄 VAULT RESET — Click UNLOCK to continue`);
        }
    }

    async function fetchBalance() {
        if(!unlocked) { addLog(`⛔ VAULT LOCKED`); return; }
        try {
            let res = await fetch(`https://blockchain.info/q/addressbalance/${BTC_ADDR}`);
            let sat = parseInt(await res.text());
            btcBalance = sat / 100000000;
            document.getElementById('btcBalance').innerText = btcBalance.toFixed(8);
            
            let rateRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=thb');
            let rateData = await rateRes.json();
            btcRate = rateData.bitcoin?.thb || 1800000;
            document.getElementById('btcRate').innerText = btcRate.toLocaleString();
            
            let thb = btcBalance * btcRate;
            document.getElementById('thbBalance').innerText = thb.toFixed(2);
            addLog(`💰 Balance: ${btcBalance.toFixed(8)} BTC (฿${thb.toFixed(2)})`);
        } catch(e) {
            addLog(`⚠️ Balance fetch failed`);
        }
    }

    function sellBTC() {
        if(!unlocked) { addLog(`⛔ VAULT LOCKED`); return; }
        addLog(`💱 Sell ${btcBalance.toFixed(8)} BTC for ~฿${(btcBalance*btcRate).toFixed(2)}`);
        addLog(`📌 Manual: Send BTC to Bitkub → Trade → Withdraw`);
    }

    function withdrawBank() {
        if(!unlocked) { addLog(`⛔ VAULT LOCKED`); return; }
        addLog(`🏦 Withdrawal: Bitkub → Wallet → THB → Withdraw to your bank`);
    }

    function generateQR() {
        if(!unlocked) { addLog(`⛔ VAULT LOCKED`); return; }
        let amount = prompt("Enter amount in THB:");
        if(amount && !isNaN(amount)) {
            let phone = prompt("Enter your PromptPay phone number:");
            if(phone) {
                addLog(`📱 QR for ฿${amount}`);
                window.open(`https://quickchart.io/qr?text=https://promptpay.io/${phone}/${amount}&size=200`, '_blank');
            }
        }
    }

    function showLicense() {
        alert("Ninurta Bank ATM\nMIT License\nSimple Vault\nNo warranty.");
        addLog(`📜 License viewed`);
    }

    // Event listeners
    document.getElementById('loginBtn').onclick = unlockVault;
    document.getElementById('resetBtn').onclick = resetVault;
    document.getElementById('refreshBtn').onclick = () => { if(unlocked) fetchBalance(); else addLog(`⛔ VAULT LOCKED`); };
    document.getElementById('sellBtn').onclick = sellBTC;
    document.getElementById('withdrawBtn').onclick = withdrawBank;
    document.getElementById('qrBtn').onclick = generateQR;
    document.getElementById('licenseBtn').onclick = showLicense;

    addLog(`⚡ VAULT READY — Click UNLOCK VAULT to begin`);
</script>
</body>
</html>
